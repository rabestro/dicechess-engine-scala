name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # Required to publish check runs with test reports
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Disables shallow clones to enable accurate historical git analytics in SonarCloud
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.5
      - name: Show sbt version
        run: sbt --version
      - name: scalafmt check
        run: sbt scalafmtCheckAll
      - name: Run tests with Coverage
        run: sbt clean coverage test coverageReport

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always() # Always run even if tests fail!
        with:
          report_paths: '**/target/test-reports/*.xml'
          detailed_summary: true
          include_passed: true
      - name: SonarQube Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
