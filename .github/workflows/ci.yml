name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Disables shallow clones to enable accurate historical git analytics in SonarCloud
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: Show sbt version
        run: sbt --version
      - name: scalafmt check
        run: sbt scalafmtCheckAll
      - name: Run tests with Coverage
        run: sbt clean coverage test coverageReport
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
