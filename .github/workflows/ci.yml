name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install coursier and sbt
        run: |
          curl -fLo cs https://git.io/coursier-cli
          chmod +x cs
          ./cs setup
      - name: Cache sbt/ivy/coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}
      - name: Show sbt version
        run: sbt --version
      - name: scalafmt check
        run: sbt scalafmtCheckAll
      - name: Run tests
        run: sbt test

