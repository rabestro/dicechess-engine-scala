name: "Ops: Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push commits, tags, and create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch all history for all tags and branches
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'sbt'

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Run validation checks
        run: mise run check

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, or set to v0.0.0 if no tags exist
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        uses: actions/github-script@v9
        with:
          script: |
            const latestTag = '${{ steps.get_tag.outputs.latest_tag }}';
            const bumpType = '${{ github.event.inputs.bump }}';

            const cleanVersion = latestTag.startsWith('v') ? latestTag.slice(1) : latestTag;
            const match = cleanVersion.match(/^(\d+)\.(\d+)\.(\d+)/);

            let major = 0;
            let minor = 0;
            let patch = 0;

            if (match) {
              major = parseInt(match[1], 10);
              minor = parseInt(match[2], 10);
              patch = parseInt(match[3], 10);
            }

            if (bumpType === 'major') {
              major += 1;
              minor = 0;
              patch = 0;
            } else if (bumpType === 'minor') {
              minor += 1;
              patch = 0;
            } else {
              patch += 1;
            }

            const newVersion = `${major}.${minor}.${patch}`;
            const newTag = `v${newVersion}`;
            core.setOutput('new_version', newVersion);
            core.setOutput('new_tag', newTag);
            console.log(`New version will be: ${newVersion}`);
            console.log(`New tag will be: ${newTag}`);

      - name: Update version in build.sbt
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          
          # Update the version field in build.sbt to have the new SNAPSHOT version
          # Matches: ThisBuild / version      := "0.1.0-SNAPSHOT"
          sed -i 's/ThisBuild \/ version      := "[^"]*"/ThisBuild \/ version      := "'"$NEW_VERSION-SNAPSHOT"'"/' build.sbt
          
          # Commit the change
          git add build.sbt
          git commit -m "chore(release): bump version to $NEW_VERSION-SNAPSHOT"
          
          # Push the commit to current branch
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          git push origin "$BRANCH_NAME"

      - name: Create new Git tag
        run: |
          git tag ${{ steps.bump_version.outputs.new_tag }}
          git push origin ${{ steps.bump_version.outputs.new_tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump_version.outputs.new_tag }}
        run: |
          # Create a release, which will in turn trigger the publish.yml workflow
          gh release create "$NEW_TAG" \
            --generate-notes \
            --title "$NEW_TAG"
