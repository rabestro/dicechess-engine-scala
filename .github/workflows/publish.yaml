name: "CD: Publish Package"

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: "sbt"

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Run checks
        run: mise run check

      - name: Build JavaScript package
        run: mise run package:prepare

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Package Registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        run: |
          # Try to upload to the existing release first (created by Ops: Release)
          # If the release does not exist yet, fallback to creating it
          gh release upload "${{ github.ref_name }}" \
            dist/dicechess-engine.js \
            dist/dicechess-engine.d.ts \
            --clobber || \
          gh release create "${{ github.ref_name }}" \
            dist/dicechess-engine.js \
            dist/dicechess-engine.d.ts \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release created by CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
