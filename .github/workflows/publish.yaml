name: "CD: Publish Package"

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: "sbt"

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      # Run sbt directly (no mise): the runner already has the JVM toolchain, jq, and gh,
      # so mise would only install the local-dev tool set for nothing. Mirrors `mise run check`.
      - name: Run checks
        run: sbt scalafmtCheckAll 'scalafixAll --check' clean coverage test coverageReport

      - name: Publish JVM artifact to GitHub Packages (Maven)
        run: sbt "set ThisBuild / version := \"${GITHUB_REF_NAME#v}\"" rootJVM/publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # package:prepare is a plain bash script (sbt + jq, both on the runner). Run its
      # js:build dependency first, then the script directly — no mise needed.
      - name: Build JavaScript package
        run: |
          sbt rootJS/fullOptJS
          bash .mise/tasks/package/prepare

      - name: Build WebAssembly package
        run: |
          sbt rootWasm/fullLinkJS
          bash .mise/tasks/package/prepare-wasm

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish JS package to GitHub Package Registry
        run: npm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Wasm package to GitHub Package Registry
        run: npm publish ./dist-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        run: |
          # Try to upload to the existing release first (created by Ops: Release)
          # If the release does not exist yet, fallback to creating it
          gh release upload "${{ github.ref_name }}" \
            dist/dicechess-engine.js \
            dist/dicechess-engine.d.ts \
            dist-wasm/main.js \
            dist-wasm/main.wasm \
            dist-wasm/__loader.js \
            --clobber || \
          gh release create "${{ github.ref_name }}" \
            dist/dicechess-engine.js \
            dist/dicechess-engine.d.ts \
            dist-wasm/main.js \
            dist-wasm/main.wasm \
            dist-wasm/__loader.js \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release created by CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
