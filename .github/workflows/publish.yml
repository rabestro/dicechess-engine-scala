name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Run checks
        run: mise run check

      - name: Build JavaScript package
        run: mise run package:prepare

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Package Registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          body: "Automated release created by CI"

      - name: Upload release asset - JS
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/dicechess-engine.js
          asset_name: dicechess-engine.js
          asset_content_type: application/javascript

      - name: Upload release asset - Types
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/dicechess-engine.d.ts
          asset_name: dicechess-engine.d.ts
          asset_content_type: text/plain

