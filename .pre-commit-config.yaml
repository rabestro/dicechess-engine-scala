repos:
  # ==============================================================================
  # Language-Agnostic Hooks (General repository health and syntax verification)
  # ==============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(md|mdx)$ # Standard Markdown uses double-spaces for line breaks; do not trim them.
      - id: end-of-file-fixer
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: check-added-large-files
        args: [ --maxkb=2048 ]
      - id: check-merge-conflict

  # ==============================================================================
  # Security Scanning (Intercept Oracle Cloud/SSH credentials before commit)
  # ==============================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
