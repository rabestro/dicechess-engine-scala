# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# =============================================================================
# CodeRabbit Configuration — Dice Chess Engine (Scala 3)
# =============================================================================
# This is a Scala 3 engine compiled to JVM and Scala.js. There is no
# hand-written JavaScript — the only JS output is machine-generated by the
# Scala.js optimizing compiler, and the Svelte 5 test harness in test-harness/.
# =============================================================================

language: en-US

reviews:
  # ── Review Style ──────────────────────────────────────────────────────────
  # "assertive" provides rigorous, performance-oriented feedback suitable
  # for a chess engine where correctness and micro-optimization matter.
  profile: assertive

  # ── Disable Summaries & Decorations ───────────────────────────────────────
  # Summaries and poems add noise to PR threads. Walkthroughs are collapsed
  # to keep the PR page clean while still being accessible on demand.
  high_level_summary: false
  poem: false
  collapse_walkthrough: true

  # ── Auto-Review Settings ──────────────────────────────────────────────────
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # ── Path Filters ──────────────────────────────────────────────────────────
  # Exclude machine-generated, vendored, and build artifact paths from review.
  path_filters:
    - "!**/target/**"
    - "!**/project/target/**"
    - "!dist/**"
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!docs/public/**"

  # ── Tool Configuration ───────────────────────────────────────────────────
  # Only enable tools that are relevant to our Scala + GitHub Actions +
  # Markdown + Shell stack. 
  tools:
    actionlint:
      enabled: true        # Validate GitHub Actions workflow YAML syntax
    gitleaks:
      enabled: true        # Detect leaked secrets (complements pre-commit hook)
    shellcheck:
      enabled: true        # Lint shell scripts in mise.toml and CI workflows
    markdownlint:
      enabled: true        # Validate documentation and README formatting

  # ── Domain-Specific Path Instructions ─────────────────────────────────────
  # Provide targeted review context for engine-critical code paths.
  path_instructions:
    - path: "shared/src/main/scala/**/domain/**"
      instructions: |
        This directory contains the core domain model using Scala 3 opaque types.
        When reviewing:
        - Verify that opaque types preserve zero-cost abstraction (no boxing).
        - Check that companion object extension methods maintain type safety.
        - Ensure bitwise operations on Bitboard (Long) are correct and handle
          all 64 squares, including edge wrapping (a-file / h-file masks).

    - path: "shared/src/main/scala/**/movegen/**"
      instructions: |
        This is the move generation engine — the most performance-critical code.
        When reviewing:
        - Prioritize correctness of bitwise shift/mask operations.
        - Flag any heap allocations in hot paths (prefer stack-local primitives).
        - Verify Magic Bitboard lookup tables are indexed correctly.
        - Check that Dice Chess rules are applied: max 3 micro-moves per turn,
          maximal micro-move count enforcement, and correct piece filtering by
          dice roll value.

    - path: "shared/src/test/**"
      instructions: |
        Tests use MUnit with a custom Test DSL (ASCII boards, algebraic varargs).
        When reviewing:
        - Ensure test names are descriptive and follow the existing naming style.
        - Verify that edge cases are covered (empty boards, full boards, pins).
        - Check JSON test fixtures in resources/ for valid FEN and correct
          expected move lists.

    - path: ".github/workflows/**"
      instructions: |
        CI/CD workflows for a Scala 3 / Scala.js cross-compiled project.
        When reviewing:
        - Ensure action versions use pinned SHA hashes (not floating tags).
        - Verify Java 25 (Temurin) and Node 26 are used consistently.
        - Check that mise tasks are used instead of raw shell commands where
          a mise task already exists.

    - path: "docs/**"
      instructions: |
        Documentation site built with Astro Starlight.
        When reviewing:
        - Check for broken internal links and correct sidebar slugs.
        - Verify Mermaid diagram syntax is valid.
        - Ensure frontmatter (title, description) is present and descriptive.

    - path: "build.sbt"
      instructions: |
        SBT build definition for a cross-compiled (JVM + JS) Scala 3 project.
        When reviewing:
        - Ensure dependency versions are consistent across JVM and JS modules.
        - Verify compiler flags are appropriate for the target platform.
        - Check that scoverage and scalafmt plugins are correctly configured.
