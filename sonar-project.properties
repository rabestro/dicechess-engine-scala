# ==============================================================================
# SonarCloud Project Configuration
# ==============================================================================

# Unique identifier representing the organization on SonarCloud
sonar.organization=rabestro

# Project identity (generated during GitHub onboarding)
sonar.projectKey=rabestro_dicechess-engine-scala
sonar.projectName=dicechess-engine-scala

# Relative paths to source and test roots
sonar.sources=src/main/scala
sonar.tests=src/test/scala

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# ==============================================================================
# Coverage Reporting (Telemetry import via sbt-scoverage)
# ==============================================================================

# Path to the generated XML report inside target subdirectory.
# SonarCloud consumes the native scoverage XML structure for detailed line analysis.
sonar.scala.coverage.reportPaths=target/scala-3.8.3/scoverage-report/scoverage.xml
