[tools]
java = "temurin-25"  # Eclipse Temurin provides a high-performance OpenJDK distribution
sbt = "1.12.11"      # The launcher; resolves project/build.properties internally
gh = "latest"
gemini = "latest"
node = "25.9.0"      # Drives the Astro Starlight documentation site
pre-commit = "4.6.0" # Fast local security and hygiene git hooks
scala-cli = "latest"

[tasks.compile]
description = "🔨 Incremental compilation of main and test sources"
run = "sbt compile"

[tasks.run]
description = "▶️ Start the engine application (HTTP API / CLI)"
run = "sbt run"

[tasks.test]
description = "🧪 Execute MUnit automated tests"
run = "sbt test"

[tasks.coverage]
description = "📊 Run tests with scoverage and generate detailed local reports"
run = "sbt clean coverage test coverageReport"

[tasks.check]
description = "✅ Run a full validation cycle (formatting check, compilation, and automated tests)"
run = "sbt scalafmtCheckAll test"

[tasks.console]
description = "💻 Launch an interactive Scala REPL preloaded with project dependencies"
run = "sbt console"

[tasks.clean]
description = "🧹 Remove build artifacts and temporary target folders"
run = "sbt clean"

[tasks.format]
description = "✨ Reformat codebase using Scalafmt"
run = "sbt scalafmtAll"

[tasks."format:check"]
description = "🔍 Verify code formatting without making modifications"
run = "sbt scalafmtCheckAll"

[tasks."docs:dev"]
description = "🚀 Run the documentation site dev server"
run = "npm run dev"
dir = "docs"

[tasks."docs:build"]
description = "📦 Build production-ready documentation static site"
run = "npm run build"
dir = "docs"

[tasks."hook:install"]
description = "🪝 Install configured pre-commit hooks into local .git config"
run = "pre-commit install"

[tasks."hook:run"]
description = "🏃 Run all configured pre-commit hooks manually across the entire codebase"
run = "pre-commit run --all-files"
