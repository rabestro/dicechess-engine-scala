[tools]
# --- Core Runtime & Build ---
java = "temurin-25"            # Primary runtime, aligned with CI (Java 25)
node = "26"                    # Required for Astro/Starlight documentation

# --- CLI Utilities ---
gh = "latest"                  # GitHub CLI for PRs, issues and workflow management
ripgrep = "latest"             # High-performance code search (grep replacement)
fd = "latest"                  # User-friendly and fast file finder
tldr = "latest"                # Practical examples for CLI commands (simplified man)

# --- AI & Automation (Agentic Tools) ---
gemini = "latest"              # AI Agent integration and automation
jq = "latest"                  # JSON processor for parsing API responses
yq = "latest"                  # YAML processor for GitHub Actions management
"aqua:SonarSource/sonarqube-cli" = "latest" # SonarQube CLI for static analysis

# --- Security & Hygiene ---
"pipx:pre-commit" = "4.6.0"    # Local git hooks for security and linting

[tasks."setup:tools"]
description = "🛠️ Install SBT (Platform-aware)"
run_windows = """
winget install --id sbt.sbt --version 1.12.11 --exact --accept-package-agreements --accept-source-agreements
"""
run = "brew install sbt"

[tasks.compile]
description = "🔨 Incremental compilation of main and test sources (JVM)"
run = "sbt rootJVM/compile"

[tasks.run]
description = "▶️ Start the engine application (JVM CLI)"
run = "sbt rootJVM/run"

[tasks.test]
description = "🧪 Execute MUnit automated tests (JVM + JS)"
run = "sbt test"

[tasks.coverage]
description = "📊 Run tests with scoverage and generate detailed local reports"
run = "sbt clean coverage rootJVM/test coverageReport"

[tasks.check]
description = "✅ Run a full validation cycle"
run = "sbt scalafmtCheckAll test"

[tasks.console]
description = "💻 Launch an interactive Scala REPL"
run = "sbt rootJVM/console"

[tasks.clean]
description = "🧹 Remove build artifacts"
run = "sbt clean"

[tasks.format]
description = "✨ Reformat codebase"
run = "sbt scalafmtAll"

[tasks."format:check"]
description = "🔍 Verify code formatting"
run = "sbt scalafmtCheckAll"

[tasks."build:js"]
description = "📦 Build optimized JavaScript bundle"
run = "sbt rootJS/fullOptJS"

[tasks."package:prepare"]
description = "📦 Prepare the distribution folder for the npm package"
depends = ["build:js"]
run = """
mkdir -p dist
VERSION=$(sbt -no-colors --error 'print version' | tail -n 1 | tr -d '[:space:]')
CLEAN_VERSION=$(echo $VERSION | sed 's/-SNAPSHOT//')
sed -i.bak "s/\\\"version\\\": \\\"[^\\\"]*\\\"/\\\"version\\\": \\\"$CLEAN_VERSION\\\"/" package.json && rm package.json.bak
cp js/target/scala-3.8.3/dicechess-engine-scala-opt/main.js dist/dicechess-engine.js
cp js/dicechess-engine.d.ts dist/
"""

[tasks."package:clean"]
description = "🧹 Remove the distribution folder"
run = "rm -rf dist"

[tasks."docs:dev"]
description = "🚀 Run the documentation site dev server"
run = "npm run dev"
dir = "docs"

[tasks."docs:build"]
description = "📦 Build production-ready documentation static site"
run = "npm run build"
dir = "docs"

[tasks."hook:install"]
description = "🪝 Install configured pre-commit hooks into local .git config"
run = "pre-commit install"

[tasks."hook:run"]
description = "🏃 Run all configured pre-commit hooks manually across the entire codebase"
run = "pre-commit run --all-files"

[tasks."release:help"]
description = "📖 Show release pipeline documentation"
run = """
echo ""
echo "╔════════════════════════════════════════════════════════════╗"
echo "║           RELEASE PIPELINE - USAGE INSTRUCTIONS            ║"
echo "╚════════════════════════════════════════════════════════════╝"
echo ""
echo "Prepare a new release with automatic version bumping:"
echo ""
echo "  mise run release:prepare [patch|minor|major]"
echo ""
echo "Examples:"
echo "  mise run release:prepare patch  # 0.1.0 → 0.1.1"
echo "  mise run release:prepare minor  # 0.1.0 → 0.2.0"
echo "  mise run release:prepare major  # 0.1.0 → 1.0.0"
echo ""
echo "What the task does:"
echo "  1. Validates the bump type (patch/minor/major)"
echo "  2. Calculates the new version"
echo "  3. Shows the version change and asks for confirmation"
echo "  4. Updates version in build.sbt and package.json"
echo "  5. Creates a git commit with the changes"
echo "  6. Creates a git tag (v<version>)"
echo "  7. Provides instructions for pushing to GitHub"
echo ""
echo "Workflow:"
echo "  1. Make sure you are on a task branch (task/XXX-...)"
echo "  2. Run: mise run release:prepare [type]"
echo "  3. Confirm when prompted"
echo "  4. Review the changes: git log -1, git show"
echo "  5. Push: git push origin && git push origin --tags"
echo "  6. Create a PR linking to the issue"
echo ""
"""

[tasks."release:prepare"]
description = "📌 Prepare release (bump version, commit, create tag)"
run = """
set -euo pipefail

# Help text
if [[ "${1:-}" == "--help" || "${1:-}" == "-h" ]]; then
  mise run release:help
  exit 0
fi

# Validate argument
if [[ -z "${1:-}" ]]; then
  echo "❌ Error: bump type not specified"
  echo ""
  mise run release:help
  exit 1
fi

bump_type="$1"
if [[ ! "$bump_type" =~ ^(patch|minor|major)$ ]]; then
  echo "❌ Error: invalid bump type '$bump_type'"
  echo "   Valid options: patch, minor, major"
  exit 1
fi

# Get current version from build.sbt (without -SNAPSHOT)
current_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
current_version="${current_tag#v}"

# Parse version components
major=$(echo "$current_version" | cut -d. -f1)
minor=$(echo "$current_version" | cut -d. -f2)
patch=$(echo "$current_version" | cut -d. -f3)

# Calculate new version
case "$bump_type" in
  major)
    major=$((major + 1))
    minor=0
    patch=0
    ;;
  minor)
    minor=$((minor + 1))
    patch=0
    ;;
  patch)
    patch=$((patch + 1))
    ;;
esac

new_version="${major}.${minor}.${patch}"
new_tag="v${new_version}"

# Show summary
echo ""
echo "╔════════════════════════════════════════════════════════════╗"
echo "║                    RELEASE SUMMARY                         ║"
echo "╚════════════════════════════════════════════════════════════╝"
echo ""
echo "  Current version: $current_version ($current_tag)"
echo "  Bump type:      $bump_type"
echo "  New version:    $new_version ($new_tag)"
echo ""
echo "Changes to be made:"
echo "  📄 build.sbt:    0.1.0-SNAPSHOT → $new_version"
echo "  📦 package.json: 0.1.0 → $new_version"
echo "  🏷️  Git tag:     $new_tag"
echo ""

# Ask for confirmation
read -p "Do you want to proceed? (yes/no) " -r confirm
if [[ ! "$confirm" =~ ^[Yy][Ee][Ss]$ ]]; then
  echo "❌ Release cancelled"
  exit 1
fi

echo ""
echo "⏳ Preparing release..."

# Update build.sbt
sed -i.bak "s/version.*:= \"[^\"]*\"/version      := \"$new_version\"/" build.sbt
rm build.sbt.bak

# Update package.json
sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$new_version\"/" package.json
rm package.json.bak

# Create commit
git add build.sbt package.json
git commit -m "chore(release): bump version to $new_version

- Update build.sbt: $new_version
- Update package.json: $new_version

Resolves: #XX (replace with your issue number in the PR)"

# Create tag
git tag "$new_tag" -m "Release $new_version"

echo ""
echo "✅ Release prepared successfully!"
echo ""
echo "╔════════════════════════════════════════════════════════════╗"
echo "║                    NEXT STEPS                              ║"
echo "╚════════════════════════════════════════════════════════════╝"
echo ""
echo "1. Verify the changes:"
echo "   git log -1 --oneline"
echo "   git show --stat"
echo ""
echo "2. Review the tag:"
echo "   git tag -ln"
echo ""
echo "3. Push to GitHub:"
echo "   git push origin"
echo "   git push origin --tags"
echo ""
echo "4. Create a Pull Request linking to the issue"
echo ""
echo "5. After PR is merged, GitHub Actions will automatically"
echo "   publish the package to npm via the 'publish.yml' workflow"
echo ""
"""
