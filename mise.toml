[tools]
# Only tools the build, hooks, or release tasks actually use. CI installs the JVM
# toolchain via setup-java/setup-sbt and runs sbt directly (see ci.yaml), so this
# section is for local development; keep it lean.
# --- Core Runtime & Build ---
java = "temurin-25"            # Primary runtime, aligned with CI (Java 25)
node = "26"                    # Required for Astro/Starlight documentation

# --- Git Hooks & Formatting ---
lefthook = "latest"            # Git hooks manager (pre-commit / pre-push)
betterleaks = "latest"         # Secret scanning in the pre-commit hook
scalafmt = "3.11.1"            # native CLI; MUST match version in .scalafmt.conf

# --- Workflow CLIs ---
gh = "latest"                  # GitHub CLI: PRs, issues, releases
jq = "latest"                  # JSON processor (used by the package:prepare task)

[tasks.setup]
description = "📦 Install tooling and register Git hooks locally"
depends = ["setup:tools", "hook:install"]

[tasks."setup:tools"]
description = "🛠️  Install system and build dependencies (SBT, universal-ctags, tree)"
run_windows = """
winget install --id sbt.sbt --version 1.12.11 --exact --accept-package-agreements --accept-source-agreements
winget install --id UniversalCtags.UniversalCtags --accept-package-agreements --accept-source-agreements
winget install --id GnuWin32.Tree --accept-package-agreements --accept-source-agreements
"""
run = "brew install sbt universal-ctags tree"

[tasks.compile]
description = "🔨 Incremental compilation of main and test sources (JVM)"
run = "sbt rootJVM/compile"

[tasks.run]
description = "▶️  Start the engine application (JVM CLI)"
run = "sbt rootJVM/run"

[tasks.test]
description = "🧪 Execute MUnit automated tests (JVM + JS)"
run = "sbt test"

[tasks.coverage]
description = "📊 Run tests with scoverage and generate detailed local reports"
run = "sbt clean coverage rootJVM/test coverageReport"

[tasks.check]
description = "✅ Run a full validation cycle"
# `scalafmtCheckAll` runs AFTER `clean`: sbt-scalafmt's incremental cache can otherwise skip an
# actually-misformatted file on a warm target/, so `check` passed locally while CI (fresh checkout)
# failed (#354). `scalafixAll --check` stays before `clean` to reuse a warm compile — no extra build.
run = "sbt 'scalafixAll --check' clean scalafmtCheckAll coverage test coverageReport"

[tasks.console]
description = "💻 Launch an interactive Scala REPL"
run = "sbt rootJVM/console"

[tasks.bench]
description = "⚡ Run all JMH benchmarks"
run = "sbt benchmark/Jmh/run"

[tasks."bench:quick"]
description = "⚡ Run a quick JMH benchmark (3 warmup, 5 measurement, 1 fork)"
run = "sbt 'benchmark/Jmh/run -wi 3 -i 5 -f 1'"

[tasks."bench:filter"]
description = "⚡ Run JMH benchmarks matching a regex pattern"
run = "sbt \"benchmark/Jmh/run {{arg(name=\\\"pattern\\\")}}\""

[tasks.arena]
description = "⚔️  Run the Bot Battle Arena match runner (JVM)"
run = "sbt 'rootJVM/runMain dicechess.engine.bench.BotMatchRunner {{arg(name=\"base\", default=\"greedy\")}} {{arg(name=\"games\", default=\"50\")}}'"

[tasks."arena:timed"]
description = "⏱️  Run the time-controlled arena (bot vs baseline across time controls; the #372 gate)"
run = "sbt 'rootJVM/runMain dicechess.engine.bench.TimedArenaRunner {{arg(name=\"bot\", default=\"monte-carlo\")}} {{arg(name=\"baseline\", default=\"aggressive\")}} {{arg(name=\"games\", default=\"10\")}} {{arg(name=\"presets\", default=\"1+0,3+2,10+10\")}}'"

[tasks.clean]
description = "🧹 Remove build artifacts"
run = "sbt clean"

[tasks.format]
description = "✨ Reformat codebase"
run = "sbt scalafmtAll scalafixAll"

[tasks."format:check"]
description = "🔍 Verify code formatting"
run = "sbt scalafmtCheckAll"

[tasks."publish:local"]
description = "📦 Publish the JVM artifact to the local Ivy repository (for downstream development)"
run = "sbt rootJVM/publishLocal"

[tasks."js:build"]
description = "📦 Build optimized JavaScript bundle"
run = "sbt rootJS/fullOptJS"

[tasks."js:dev"]
description = "📦 Build fast JavaScript bundle for local dev"
run = "sbt rootJS/fastOptJS"

[tasks."package:clean"]
description = "🧹 Remove the distribution folder"
run = "rm -rf dist"

[tasks."docs:generate"]
description = "📝 Generate visual test cases catalog from JSON files"
run = "sbt \"project rootJVM\" \"Test / runMain dicechess.engine.movegen.DocGenerator\""

[tasks."docs:search:generate"]
description = "📝 Generate visual test cases catalog for King Capture Probability"
run = "sbt \"project rootJVM\" \"Test / runMain dicechess.engine.search.KingCaptureDocGenerator\""

# Single sbt session for all generators: parallel depends would boot two sbt
# instances in the same project and collide on the server socket (#326).
[tasks."docs:generate:all"]
description = "📝 Generate all visual test-case catalogs in a single sbt session"
run = "sbt \"project rootJVM\" \"Test / runMain dicechess.engine.movegen.DocGenerator\" \"Test / runMain dicechess.engine.search.KingCaptureDocGenerator\""

[tasks."docs:dev"]
description = "🚀 Run the documentation site dev server"
depends = ["docs:generate:all"]
run = "npm run dev"
dir = "docs"

[tasks."docs:build"]
description = "📦 Build production-ready documentation static site"
depends = ["docs:generate:all"]
run = "npm run build"
dir = "docs"

[tasks."hook:install"]
description = "🪝 Register Git hooks via lefthook"
run = "lefthook install"

[tasks."hook:run"]
description = "🏃 Run all pre-commit hook jobs manually across the entire codebase"
run = "lefthook run pre-commit --all-files"
