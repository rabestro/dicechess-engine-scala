[tools]
# --- Core Runtime & Build ---
java = "temurin-25"            # Primary runtime, aligned with CI (Java 25)
node = "26"                    # Required for Astro/Starlight documentation

# --- Security & Hygiene ---
"pipx:pre-commit" = "4.6.0"    # Local git hooks for security and linting

# --- AI & Automation (Agentic Tools) ---
gh = "latest"                  # GitHub CLI for PRs, issues and workflow management
fd = "latest"                  # User-friendly and fast file finder
jq = "latest"                  # JSON processor for parsing API responses
yq = "latest"                  # YAML processor for GitHub Actions management
ripgrep = "latest"             # High-performance code search (grep replacement)
ast-grep = "latest"            # Structural AST code search and rewrite utility
tokei = "latest"               # Code statistics engine (LOC, complexity analysis)
"aqua:tealdeer-rs/tealdeer" = "latest"      # Simplified man pages (tldr)
"aqua:SonarSource/sonarqube-cli" = "latest" # SonarQube CLI for static analysis

[tasks."setup:tools"]
description = "🛠️  Install system and build dependencies (SBT, universal-ctags, tree)"
run_windows = """
winget install --id sbt.sbt --version 1.12.11 --exact --accept-package-agreements --accept-source-agreements
winget install --id UniversalCtags.UniversalCtags --accept-package-agreements --accept-source-agreements
winget install --id GnuWin32.Tree --accept-package-agreements --accept-source-agreements
"""
run = "brew install sbt universal-ctags tree"

[tasks.compile]
description = "🔨 Incremental compilation of main and test sources (JVM)"
run = "sbt rootJVM/compile"

[tasks.run]
description = "▶️  Start the engine application (JVM CLI)"
run = "sbt rootJVM/run"

[tasks.test]
description = "🧪 Execute MUnit automated tests (JVM + JS)"
run = "sbt test"

[tasks.coverage]
description = "📊 Run tests with scoverage and generate detailed local reports"
run = "sbt clean coverage rootJVM/test coverageReport"

[tasks.check]
description = "✅ Run a full validation cycle"
run = "sbt scalafmtCheckAll test"

[tasks.console]
description = "💻 Launch an interactive Scala REPL"
run = "sbt rootJVM/console"

[tasks.bench]
description = "⚡ Run all JMH benchmarks"
run = "sbt benchmark/Jmh/run"

[tasks."bench:quick"]
description = "⚡ Run a quick JMH benchmark (3 warmup, 5 measurement, 1 fork)"
run = "sbt 'benchmark/Jmh/run -wi 3 -i 5 -f 1'"

[tasks."bench:filter"]
description = "⚡ Run JMH benchmarks matching a regex pattern"
run = "sbt \"benchmark/Jmh/run {{arg(name=\\\"pattern\\\")}}\""

[tasks.arena]
description = "⚔️  Run the Bot Battle Arena match runner (JVM)"
run = "sbt 'rootJVM/runMain dicechess.engine.bench.BotMatchRunner {{arg(name=\"base\", default=\"greedy\")}} {{arg(name=\"games\", default=\"50\")}}'"

[tasks.clean]
description = "🧹 Remove build artifacts"
run = "sbt clean"

[tasks.format]
description = "✨ Reformat codebase"
run = "sbt scalafmtAll"

[tasks."format:check"]
description = "🔍 Verify code formatting"
run = "sbt scalafmtCheckAll"

[tasks."build:js"]
description = "📦 Build optimized JavaScript bundle"
run = "sbt rootJS/fullOptJS"

[tasks."build:js:dev"]
description = "📦 Build fast JavaScript bundle for local dev"
run = "sbt rootJS/fastOptJS"

[tasks."package:clean"]
description = "🧹 Remove the distribution folder"
run = "rm -rf dist"

[tasks."docs:generate"]
description = "📝 Generate visual test cases catalog from JSON files"
run = "sbt \"project rootJVM\" \"Test / runMain dicechess.engine.movegen.DocGenerator\""

[tasks."docs:search:generate"]
description = "📝 Generate visual test cases catalog for King Capture Probability"
run = "sbt \"project rootJVM\" \"Test / runMain dicechess.engine.search.KingCaptureDocGenerator\""

[tasks."docs:dev"]
description = "🚀 Run the documentation site dev server"
depends = ["docs:generate"]
run = "npm run dev"
dir = "docs"

[tasks."docs:build"]
description = "📦 Build production-ready documentation static site"
depends = ["docs:generate"]
run = "npm run build"
dir = "docs"

[tasks."hook:install"]
description = "🪝 Install configured pre-commit hooks into local .git config"
run = "pre-commit install"

[tasks."hook:run"]
description = "🏃 Run all configured pre-commit hooks manually across the entire codebase"
run = "pre-commit run --all-files"
